version: "3.9"
services:

  postgres:
    image: postgres:16
    container_name: nostra_postgres
    restart: always
    environment:
      POSTGRES_USER: nostra
      POSTGRES_PASSWORD: nostra123
      POSTGRES_DB: nostra_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: nostra_redis
    restart: always
    ports:
      - "6379:6379"

  relay:
    image: dockurr/strfry
    ports:
      - "7777:7777"
    volumes:
      - ./data:/app/data

  backend:
      build:
        context: ./apps/backend
        dockerfile: Dockerfile
      container_name: nostra_backend
      restart: always
      environment:
        DATABASE_URL: postgres://nostra:nostra123@postgres:5432/nostra_db
        REDIS_URL: redis://redis:6379
      depends_on:
        - postgres
        - redis
      ports:
        - "8080:8080"

  frontend:
    build:
      context: ./apps/frontend/web
      dockerfile: Dockerfile
    container_name: nostra_frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata: